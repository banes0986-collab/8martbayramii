# ==============================================================================
#                  SalxAET - Gelişmiş AntiCheat Konfigürasyonu
#               Tasarlayan & Geliştiren: LegacyNetwork (SalxAET)
# ==============================================================================

settings:
  send-alerts: true
  log-to-console: true

checks:
  speed:
    enabled: true
    threshold: 0.85
    max-violations: 8
    rubberband: true

  fly:
    enabled: true
    max-violations: 5
    rubberband: true

  noweb:
    enabled: true # [NOWEB] Örümcek ağında hızlı yürüme engeli aktif!

  killaura:
    enabled: true
    min-ms-delay: 45 # CPS Limiti
    check-rotation: true # Killaura anlık kilitlenme ve rotasyon koruması

  antiwall:
    enabled: true # [ANTI-WALL] Duvar arkasından vurma engeli aktif!

  reach:
    enabled: true
    max-distance: 3.4 # Blok ulaşım sınırı (Aura Reach yakalaması için ideal)

  hitbox:
    enabled: true
    max-angle: 110.0 # Görüş açısı dışı hileli vuruş koruması

  nuker:
    enabled: true
    max-breaks-per-sec: 15

  elytra:
    enabled: true
    max-speed: 1.8
    
