uyari-limiti: 3
dondurma-limiti: 6
dondurma-suresi-saniye: 10

kontroller:

  KillAuraA:
    aktif: true
    maksimum-mesafe: 3.4     
    ping-toleransi: 0.4      
 
  KillAuraB:
    aktif: true
    snap-acisi: 75.0         
    min-mesafe: 1.5         
 
  KillAuraC:
    aktif: true
 
  KillAuraD:
    aktif: true
    maksimum-aci: 120.0      
    min-mesafe: 2.0          
  
  KillAuraF:
    aktif: true
    kilit-acisi: 30.0       
    min-mesafe: 3.0          
  
  KillAuraG:
    aktif: true
    maksimum-aci: 20.0
    min-mesafe: 1.5

  RotationCheck:
    aktif: true              
    combat-suresi-ms: 1500   
    ornek-sayisi: 20         
    dusuk-sd-esigi: 0.05     
    yuksek-sd-esigi: 180.0   
    min-toplam-rotasyon: 5.0 
    min-sifir-olmayan: 15    
    sd-esik: 4               
    div-kontrol-aktif: true  
    gcd-esigi: 0.00005       
