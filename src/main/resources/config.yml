    gcd-cift-dogrulama: true 
    gcd-cift-esik: 5               

    aim-korelasyon-aktif: true 
    aim-korelasyon-min-ornek: 8     
    aim-korelasyon-maks-sd: 1.5     
    aim-korelasyon-maks-ort: 3.0    
    aim-korelasyon-esik: 2          
    track-kontrol-aktif: true
    track-min-ornek: 5
    track-maks-sd: 0.15
    track-maks-ort: 3.0

  AutoClickCheck:
    aktif: true
    maksimum-cps: 18

  MultiTargetCheck:
    aktif: true              
    pencere-saniye: 2       
