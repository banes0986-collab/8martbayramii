name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8' # Burası '8' kalarak 1.16.5'ten 1.21.1 sunucularına kadar tam uyum sağlar!
        distribution: 'temurin'
        cache: maven
        
    - name: Build with Maven
      run: mvn clean package

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SalxAET-Plugin
        path: target/*.jar
        
