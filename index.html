<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8 Mart Özel</title>
    <style>
        /* Genel Tasarım */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background-color: #fff; /* Temiz beyaz arka plan */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .box {
            width: 90%;
            max-width: 400px;
            padding: 20px;
        }

        /* Giriş Ekranı Formu */
        #giris-ekrani h2 { color: #d63384; }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
        }
        button {
            background-color: #d63384;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
        }

        /* Kutlama Ekranı (Başta Gizli) */
        #kutlama-ekrani {
            display: none;
        }
        .mesaj-kutusu {
            font-size: 24px;
            color: #333;
        }
        .ozel-not {
            margin-top: 20px;
            font-style: italic;
            color: #d63384;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <div id="giris-ekrani" class="box">
        <h2>8 Mart Kutlama Paneli</h2>
        <input type="text" id="isim" placeholder="İsminiz: Örn. Aysel">
        <input type="text" id="mesaj" placeholder="Mesaj: Örn. Seni seviyorum">
        <button onclick="sayfayiAc()">GÖNDER</button>
    </div>

    <div id="kutlama-ekrani" class="box">
        <div class="mesaj-kutusu">
            <span id="kisi-ismi"></span> <br>
            8 Mart Dünya Kadınlar Günün Kutlu Olsun 🤍
        </div>
        <div id="kisi-mesaji" class="ozel-not"></div>
    </div>

    <script>
        function sayfayiAc() {
            var ad = document.getElementById('isim').value;
            var not = document.getElementById('mesaj').value;

            if(ad == "") {
                alert("Lütfen bir isim gir kanka!");
                return;
            }

            // Giriş formunu gizle
            document.getElementById('giris-ekrani').style.display = 'none';
            
            // Kutlama ekranını göster
            document.getElementById('kutlama-ekrani').style.display = 'block';

            // Bilgileri ekrana yaz
            document.getElementById('kisi-ismi').innerText = ad;
            document.getElementById('kisi-mesaji').innerText = not;
        }
    </script>

</body>
</html>
